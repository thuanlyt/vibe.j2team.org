<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="320" height="320" style="overflow: visible;">
    <style>
        /* Chuyển động rung lắc liên tục (Shiver/Shake) tốc độ cao */
        .warning-body {
            animation: shiver 0.12s infinite;
            transform-origin: 100px 165px;
        }
        @keyframes shiver {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-1.5px, 0.5px); }
            50% { transform: translate(1px, -1px); }
            75% { transform: translate(1.5px, 1.5px); }
            100% { transform: translate(0, 0); }
        }

        /* Chớp màu Amber (Cam Hổ Phách) cảnh báo liên tục */
        .amber-tint {
            animation: amber-pulse 0.8s infinite alternate ease-in-out;
        }
        @keyframes amber-pulse {
            0% { fill: #f59e0b; } /* Amber 500 - Cam đậm */
            100% { fill: #fbbf24; } /* Amber 400 - Cam vàng sáng */
        }

        /* Bóng đổ dưới đất cũng rung theo nhịp cơ thể */
        .warning-shadow {
            animation: shadow-shiver 0.12s infinite;
            transform-origin: 100px 165px;
        }
        @keyframes shadow-shiver {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(0.98); opacity: 0.25; }
        }

        /* Miệng zigzag run rẩy */
        .mouth-tremble {
            animation: tremble 0.08s infinite alternate;
            transform-origin: 100px 116px;
        }
        @keyframes tremble {
            0% { transform: scaleX(1) translateY(0); }
            100% { transform: scaleX(0.92) translateY(-1px); }
        }

        /* Mắt thỉnh thoảng giật giật (Twitch) báo hiệu sự bất ổn / chaos */
        .eye-twitch {
            animation: twitch 3s infinite;
        }
        @keyframes twitch {
            0%, 88%, 100% { transform: scale(1) translate(0, 0); }
            90%, 94% { transform: scale(1.15, 0.85) translate(-1px, 1px); }
            92%, 96% { transform: scale(0.85, 1.15) translate(1px, -1px); }
        }

        /* Giọt mồ hôi hột rớt xuống (Sweat drop) */
        .sweat-drop {
            animation: sweat-anim 1.5s infinite;
        }
        @keyframes sweat-anim {
            0% { opacity: 0; transform: translateY(-10px) scale(0.5); }
            20% { opacity: 1; transform: translateY(0) scale(1); }
            80% { opacity: 1; transform: translateY(15px) scale(1.1); }
            100% { opacity: 0; transform: translateY(20px) scale(0.5); }
        }
    </style>

    <!-- Bóng dưới mặt đất -->
    <ellipse class="warning-shadow" cx="100" cy="165" rx="55" ry="12" fill="#000000" />

    <!-- Nhóm toàn bộ cơ thể Slime -->
    <g class="warning-body">
        
        <!-- Thân hình Slime đã đổi sang màu Amber -->
        <path class="amber-tint" d="M 50 145 C 50 85, 70 50, 100 50 C 130 50, 150 85, 150 145 C 160 145, 160 165, 100 165 C 40 165, 40 145, 50 145 Z" />

        <!-- Điểm nhấn bắt sáng (Highlight) -->
        <path d="M 70 75 Q 100 55 130 75" stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4" />

        <!-- KHUÔN MẶT CĂNG THẲNG / CHAOS -->
        <g>
            <!-- Mắt trái (Mở to, tròng đen nhỏ xíu, có hiệu ứng giật) -->
            <g class="eye-twitch" style="transform-origin: 82px 100px;">
                <circle cx="82" cy="100" r="8" fill="#0f172a" />
                <circle cx="82" cy="100" r="1.5" fill="#ffffff" />
            </g>
            
            <!-- Mắt phải (Giật trễ nhịp hơn 1 chút để tạo cảm giác điên cuồng) -->
            <g class="eye-twitch" style="transform-origin: 118px 100px; animation-delay: 0.15s;">
                <circle cx="118" cy="100" r="8" fill="#0f172a" />
                <circle cx="118" cy="100" r="1.5" fill="#ffffff" />
            </g>

            <!-- Quầng thâm mắt mệt mỏi/căng thẳng -->
            <path d="M 70 110 Q 82 113 90 106" stroke="#b45309" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round" />
            <path d="M 130 110 Q 118 113 110 106" stroke="#b45309" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round" />

            <!-- Miệng mím lại hình Zigzag run rẩy -->
            <path class="mouth-tremble" d="M 85 118 L 91 114 L 97 118 L 103 114 L 109 118 L 115 114" stroke="#0f172a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        </g>

        <!-- HIỆU ỨNG VÃ MỒ HÔI (SWEAT DROPS) -->
        <!-- Giọt lớn bên phải -->
        <path class="sweat-drop" style="transform-origin: 135px 85px;" d="M 135 80 C 145 95, 145 105, 135 105 C 125 105, 125 95, 135 80 Z" fill="#60a5fa" opacity="0.8" />
        
        <!-- Giọt nhỏ bên trái (Rơi lệch nhịp) -->
        <path class="sweat-drop" style="transform-origin: 65px 90px; animation-delay: 0.5s; animation-duration: 1.2s;" d="M 65 90 C 72 100, 72 108, 65 108 C 58 108, 58 100, 65 90 Z" fill="#60a5fa" opacity="0.6" />
    </g>
</svg>