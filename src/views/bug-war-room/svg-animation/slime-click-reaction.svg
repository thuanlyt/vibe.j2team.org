<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="320" height="320" style="overflow: visible;">
    <style>
        /* Chuyển động nảy đàn hồi (Jelly Bounce) khi bị click */
        .click-body {
            transform-origin: 100px 165px;
            animation: click-bounce 3s infinite;
        }

        @keyframes click-bounce {
            0%, 19%, 35%, 100% { transform: scale(1, 1) translateY(0); }
            /* Bị click lún xuống (Squash) */
            20% { transform: scale(1.25, 0.75) translateY(12px); }
            /* Bật nảy lên (Stretch) */
            25% { transform: scale(0.85, 1.15) translateY(-15px); }
            /* Rung rinh ổn định lại (Wobble) */
            30% { transform: scale(1.05, 0.95) translateY(2px); }
            32% { transform: scale(0.98, 1.02) translateY(-1px); }
        }

        /* Bóng đổ co giãn mạnh theo cú nảy */
        .click-shadow {
            transform-origin: 100px 165px;
            animation: click-shadow-anim 3s infinite;
        }

        @keyframes click-shadow-anim {
            0%, 19%, 35%, 100% { transform: scale(1); opacity: 0.3; }
            20% { transform: scale(1.3); opacity: 0.5; }
            25% { transform: scale(0.8); opacity: 0.2; }
            30% { transform: scale(1.1); opacity: 0.35; }
        }

        /* Chuyển đổi trạng thái khuôn mặt (Bình thường sang Giật mình) */
        .face-normal { animation: hide-face 3s infinite; }
        .face-surprised { animation: show-face 3s infinite; opacity: 0; }
        
        @keyframes hide-face {
            0%, 19%, 40%, 100% { opacity: 1; }
            20%, 39% { opacity: 0; }
        }
        @keyframes show-face {
            0%, 19%, 40%, 100% { opacity: 0; }
            20%, 39% { opacity: 1; }
        }

        /* Dấu chấm than giật mình bật lên */
        .exclamation-mark {
            transform-origin: 100px 45px;
            animation: pop-mark 3s infinite;
            opacity: 0;
        }

        @keyframes pop-mark {
            0%, 19%, 40%, 100% { transform: translateY(15px) scale(0); opacity: 0; }
            20% { transform: translateY(0) scale(1.2) rotate(10deg); opacity: 1; }
            25% { transform: translateY(-5px) scale(1) rotate(-5deg); opacity: 1; }
            35% { transform: translateY(-5px) scale(1) rotate(0deg); opacity: 1; }
            39% { transform: translateY(-10px) scale(0.5); opacity: 0; }
        }

        /* Hiệu ứng gợn sóng từ chỗ con chuột chạm vào */
        .click-ripple {
            transform-origin: 120px 110px;
            animation: ripple-action 3s infinite;
            fill: none;
            stroke: #ffffff;
            stroke-width: 3;
        }

        @keyframes ripple-action {
            0%, 19%, 40%, 100% { transform: scale(0); opacity: 0; }
            20% { transform: scale(0.5); opacity: 0.8; }
            30% { transform: scale(2.5); opacity: 0; }
        }
    </style>

    <!-- Bóng dưới mặt đất -->
    <ellipse class="click-shadow" cx="100" cy="165" rx="55" ry="12" fill="#000000" />

    <!-- NHÓM CƠ THỂ SLIME NẢY LÊN -->
    <g class="click-body">
        
        <!-- Thân hình Slime màu xanh lá -->
        <path d="M 50 145 C 50 85, 70 50, 100 50 C 130 50, 150 85, 150 145 C 160 145, 160 165, 100 165 C 40 165, 40 145, 50 145 Z" fill="#34d399" />

        <!-- Điểm nhấn bắt sáng -->
        <path d="M 70 75 Q 100 55 130 75" stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4" />

        <!-- KHUÔN MẶT BÌNH THƯỜNG (Hiện lúc chờ) -->
        <g class="face-normal">
            <circle cx="82" cy="100" r="7" fill="#0f172a" />
            <circle cx="118" cy="100" r="7" fill="#0f172a" />
            <circle cx="80" cy="98" r="2.5" fill="#ffffff" />
            <circle cx="116" cy="98" r="2.5" fill="#ffffff" />
            <ellipse cx="65" cy="112" rx="8" ry="4" fill="#ef4444" opacity="0.3" />
            <ellipse cx="135" cy="112" rx="8" ry="4" fill="#ef4444" opacity="0.3" />
            <path d="M 90 115 Q 100 128 110 115" stroke="#0f172a" stroke-width="3.5" stroke-linecap="round" fill="none" />
        </g>

        <!-- KHUÔN MẶT GIẬT MÌNH BẤT NGỜ (Hiện lúc bị click) -->
        <g class="face-surprised">
            <!-- Mắt tròn xoe ngơ ngác -->
            <circle cx="82" cy="98" r="8" fill="#0f172a" />
            <circle cx="82" cy="98" r="2" fill="#ffffff" />
            <circle cx="118" cy="98" r="8" fill="#0f172a" />
            <circle cx="118" cy="98" r="2" fill="#ffffff" />
            
            <!-- Má hồng ửng đậm hơn vì bất ngờ -->
            <ellipse cx="65" cy="110" rx="8" ry="4" fill="#ef4444" opacity="0.5" />
            <ellipse cx="135" cy="110" rx="8" ry="4" fill="#ef4444" opacity="0.5" />
            
            <!-- Miệng chữ O -->
            <ellipse cx="100" cy="116" rx="5" ry="8" fill="#0f172a" />
        </g>
    </g>

    <!-- DẤU CHẤM THAN GIẬT MÌNH TRÊN ĐỈNH ĐẦU -->
    <g class="exclamation-mark">
        <path d="M 95 15 L 105 15 L 102 35 L 98 35 Z" fill="#ef4444" stroke="#ffffff" stroke-width="2" stroke-linejoin="round"/>
        <circle cx="100" cy="44" r="4.5" fill="#ef4444" stroke="#ffffff" stroke-width="2"/>
    </g>

    <!-- HIỆU ỨNG GỢN SÓNG KHI CLICK -->
    <circle class="click-ripple" cx="120" cy="110" r="15" />
</svg>