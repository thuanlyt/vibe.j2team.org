<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="320" height="320" style="overflow: visible;">
    <style>
        /* Chuyển động thở (phồng xẹp) và lắc lư nhẹ (wobble) */
        .idle-body {
            animation: idle-breathe 3s ease-in-out infinite;
            /* Tâm xoay và co giãn nằm ở đáy của Slime */
            transform-origin: 100px 165px; 
        }

        @keyframes idle-breathe {
            0%, 100% { transform: scale(1, 1) rotate(0deg); }
            /* Xẹp xuống, bè ra và nghiêng nhẹ sang phải */
            25% { transform: scale(1.03, 0.96) rotate(1.5deg); }
            /* Kéo dài lên, ốm lại và thẳng đứng */
            50% { transform: scale(0.98, 1.04) rotate(0deg); }
            /* Xẹp xuống, bè ra và nghiêng nhẹ sang trái */
            75% { transform: scale(1.03, 0.96) rotate(-1.5deg); }
        }

        /* Bóng đổ dưới đất co giãn theo nhịp thở */
        .idle-shadow {
            animation: idle-shadow-anim 3s ease-in-out infinite;
            transform-origin: 100px 165px;
        }

        @keyframes idle-shadow-anim {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            25%, 75% { transform: scale(1.06); opacity: 0.4; }
            50% { transform: scale(0.94); opacity: 0.2; }
        }

        /* Chớp mắt ngẫu nhiên */
        .blink-eye {
            animation: blink-anim 5s infinite;
        }

        @keyframes blink-anim {
            /* Giữ nguyên trạng thái mở mắt phần lớn thời gian */
            0%, 45%, 49%, 75%, 78%, 100% { transform: scaleY(1); }
            /* Chớp mắt kép (nhanh) */
            46%, 48% { transform: scaleY(0.1); }
            /* Chớp mắt đơn */
            76%, 77% { transform: scaleY(0.1); }
        }

        /* Vệt sáng trên đầu lướt nhẹ tạo cảm giác 3D béo ngậy */
        .highlight {
            animation: highlight-glide 3s ease-in-out infinite;
        }

        @keyframes highlight-glide {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(2px); }
            75% { transform: translateX(-2px); }
        }
    </style>

    <!-- Bóng dưới mặt đất -->
    <ellipse class="idle-shadow" cx="100" cy="165" rx="55" ry="12" fill="#000000" />

    <!-- Nhóm toàn bộ cơ thể Slime -->
    <g class="idle-body">
        
        <!-- Thân hình Slime màu xanh lá -->
        <path d="M 50 145 C 50 85, 70 50, 100 50 C 130 50, 150 85, 150 145 C 160 145, 160 165, 100 165 C 40 165, 40 145, 50 145 Z" fill="#34d399" />

        <!-- Điểm nhấn bắt sáng (Highlight) -->
        <path class="highlight" d="M 70 75 Q 100 55 130 75" stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4" />

        <!-- KHUÔN MẶT -->
        <g>
            <!-- Mắt Trái (nhóm lại để chớp) -->
            <g class="blink-eye" style="transform-origin: 82px 100px;">
                <circle cx="82" cy="100" r="7" fill="#0f172a" />
                <circle cx="80" cy="98" r="2.5" fill="#ffffff" />
            </g>
            
            <!-- Mắt Phải (nhóm lại để chớp) -->
            <g class="blink-eye" style="transform-origin: 118px 100px;">
                <circle cx="118" cy="100" r="7" fill="#0f172a" />
                <circle cx="116" cy="98" r="2.5" fill="#ffffff" />
            </g>

            <!-- Má hồng -->
            <ellipse cx="65" cy="112" rx="8" ry="4" fill="#ef4444" opacity="0.3" />
            <ellipse cx="135" cy="112" rx="8" ry="4" fill="#ef4444" opacity="0.3" />
            
            <!-- Miệng cười chúm chím -->
            <path d="M 90 115 Q 100 128 110 115" stroke="#0f172a" stroke-width="3.5" stroke-linecap="round" fill="none" />
        </g>

    </g>
</svg>