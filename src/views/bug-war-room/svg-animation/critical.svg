<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="320" height="320" style="overflow: visible;">
    <style>
        /* Chuyển động rung/giật tốc độ CỰC NHANH (0.05s) - Hoảng loạn tột độ */
        .critical-shake {
            animation: ultra-shiver 0.05s infinite;
            transform-origin: 100px 165px;
        }
        @keyframes ultra-shiver {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-2.5px, 1.5px) rotate(-1deg); }
            50% { transform: translate(2px, -2px) rotate(1deg); }
            75% { transform: translate(2.5px, 2.5px) rotate(-0.5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* Dáng đứng co rúm (Cower) và thở dốc mạnh */
        .cower-stance {
            transform-origin: 100px 165px;
            animation: cower-thump 0.4s infinite alternate ease-in-out;
        }
        @keyframes cower-thump {
            0% { transform: scale(0.88, 0.75); } /* Thu nhỏ và ép dẹp xuống */
            100% { transform: scale(0.82, 0.70) translateY(3px); } /* Co rúm sát đất hơn */
        }

        /* Chớp nháy màu Đỏ - Coral liên tục (Báo động đỏ) */
        .coral-tint {
            animation: coral-pulse 0.3s infinite alternate ease-in-out;
        }
        @keyframes coral-pulse {
            0% { fill: #ef4444; } /* Red 500 - Đỏ cảnh báo */
            100% { fill: #ff7f50; } /* Coral - Đỏ san hô */
        }

        /* Bóng đổ co rúm lại */
        .critical-shadow {
            transform-origin: 100px 165px;
            animation: shadow-thump 0.4s infinite alternate ease-in-out;
        }
        @keyframes shadow-thump {
            0% { transform: scale(0.85); opacity: 0.4; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }

        /* Mồ hôi tuôn như mưa (Fast sweat) */
        .fast-sweat {
            animation: fast-sweat-anim 0.6s infinite linear;
        }
        @keyframes fast-sweat-anim {
            0% { opacity: 0; transform: translateY(-5px) scale(0.6); }
            20% { opacity: 1; transform: translateY(5px) scale(1.2); }
            80% { opacity: 1; transform: translateY(25px) scale(0.9); }
            100% { opacity: 0; transform: translateY(35px) scale(0.5); }
        }
    </style>

    <!-- Bóng dưới mặt đất (nhỏ hơn, đậm hơn do co rúm) -->
    <ellipse class="critical-shadow" cx="100" cy="165" rx="55" ry="12" fill="#000000" />

    <!-- Nhóm Rung giật cực mạnh -->
    <g class="critical-shake">
        
        <!-- Nhóm Co rúm phòng thủ -->
        <g class="cower-stance">
            
            <!-- Thân hình Slime màu Coral/Red -->
            <path class="coral-tint" d="M 50 145 C 50 85, 70 50, 100 50 C 130 50, 150 85, 150 145 C 160 145, 160 165, 100 165 C 40 165, 40 145, 50 145 Z" />

            <!-- Điểm nhấn bắt sáng (Highlight) -->
            <path d="M 70 75 Q 100 55 130 75" stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4" />

            <!-- KHUÔN MẶT SỢ HÃI / CHỊU ĐỰNG (><) -->
            <g>
                <!-- Mắt nhắm nghiền hình >< -->
                <path d="M 88 92 L 72 100 L 88 108" stroke="#0f172a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
                <path d="M 112 92 L 128 100 L 112 108" stroke="#0f172a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" />

                <!-- Đường gân/Quầng thâm dưới mắt căng thẳng -->
                <path d="M 68 112 Q 80 116 88 110" stroke="#7f1d1d" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round" />
                <path d="M 132 112 Q 120 116 112 110" stroke="#7f1d1d" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round" />

                <!-- Miệng nghiến chặt hình răng cưa lớn -->
                <path d="M 78 122 L 85 115 L 92 124 L 100 114 L 108 124 L 115 115 L 122 122" stroke="#0f172a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            </g>

            <!-- MỒ HÔI TÚA RA LIÊN TỤC -->
            <!-- Giọt lớn bên phải (Rơi cực nhanh) -->
            <path class="fast-sweat" style="transform-origin: 140px 85px;" d="M 135 75 C 148 95, 148 108, 135 108 C 122 108, 122 95, 135 75 Z" fill="#93c5fd" opacity="0.9" />
            
            <!-- Giọt lớn bên trái (Lệch nhịp) -->
            <path class="fast-sweat" style="transform-origin: 65px 85px; animation-delay: 0.25s;" d="M 65 75 C 78 95, 78 108, 65 108 C 52 108, 52 95, 65 75 Z" fill="#93c5fd" opacity="0.9" />
            
            <!-- Giọt nhỏ trên trán (Lệch nhịp) -->
            <path class="fast-sweat" style="transform-origin: 100px 50px; animation-delay: 0.4s; animation-duration: 0.5s;" d="M 100 45 C 108 60, 108 70, 100 70 C 92 70, 92 60, 100 45 Z" fill="#93c5fd" opacity="0.8" />
        </g>
    </g>
</svg>