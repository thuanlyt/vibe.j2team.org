<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="320" height="320" style="overflow: visible;">
    <style>
        /* Chuyển động gật đầu tự tin (Kéo dài 3s để dễ xem loop) */
        .trust-body {
            transform-origin: 100px 165px;
            animation: confident-nod 3s infinite;
        }

        @keyframes confident-nod {
            0%, 10% { transform: scale(1, 1) translateY(0); }
            /* Rướn lên lấy đà (Anticipation) */
            15% { transform: scale(0.95, 1.05) translateY(-5px); }
            /* Gật đầu dứt khoát xuống (Squash) */
            20% { transform: scale(1.15, 0.85) translateY(12px); }
            /* Bật nảy lên lại (Overshoot) */
            25% { transform: scale(0.98, 1.02) translateY(-2px); }
            /* Pose tự tin */
            30%, 80% { transform: scale(1, 1) translateY(0); }
            /* Thở nhẹ khi đang pose */
            55% { transform: scale(1.02, 0.98) translateY(1px); }
            
            100% { transform: scale(1, 1) translateY(0); }
        }

        /* Khuôn mặt di chuyển biên độ lớn hơn cơ thể để nhấn mạnh cú gật */
        .trust-face {
            animation: face-nod 3s infinite;
        }

        @keyframes face-nod {
            0%, 10% { transform: translateY(0); }
            15% { transform: translateY(-3px); }
            20% { transform: translateY(8px); } /* Mặt gục sâu hơn */
            25% { transform: translateY(-1px); }
            30%, 100% { transform: translateY(0); }
        }

        /* Bóng đổ giãn theo cơ thể */
        .trust-shadow {
            transform-origin: 100px 165px;
            animation: shadow-nod 3s infinite;
        }

        @keyframes shadow-nod {
            0%, 10% { transform: scale(1); opacity: 0.3; }
            15% { transform: scale(0.85); opacity: 0.2; }
            20% { transform: scale(1.25); opacity: 0.45; }
            25% { transform: scale(0.95); opacity: 0.25; }
            30%, 80% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(1); opacity: 0.3; }
        }

        /* Aura tỏa ra từ phía sau nhân vật */
        .aura-effect {
            transform-origin: 100px 135px; /* Tâm tỏa ra từ giữa cơ thể */
            animation: aura-burst 3s infinite;
            fill: none;
            stroke: #3b82f6; /* Blue 500 */
            stroke-width: 6;
            stroke-linecap: round;
        }

        .aura-delay {
            animation-delay: 0.15s;
            stroke: #93c5fd; /* Blue 300 - nhạt hơn cho lớp sóng sau */
            stroke-width: 4;
        }

        @keyframes aura-burst {
            0%, 19% { transform: scale(0.8); opacity: 0; }
            20% { transform: scale(1); opacity: 0.8; } /* Tỏa ra ngay lúc gật đầu xuống */
            45% { transform: scale(1.5); opacity: 0; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* Ngôi sao lấp lánh tự tin (Sparkle) */
        .trust-sparkle {
            transform-origin: 135px 90px;
            animation: sparkle-pop 3s infinite;
        }

        @keyframes sparkle-pop {
            0%, 22% { transform: scale(0) rotate(0deg); opacity: 0; }
            26% { transform: scale(1.3) rotate(45deg); opacity: 1; }
            32%, 75% { transform: scale(1) rotate(90deg); opacity: 1; }
            82%, 100% { transform: scale(0) rotate(135deg); opacity: 0; }
        }
    </style>

    <!-- Aura Sóng Năng Lượng Xanh (Nằm dưới cùng) -->
    <!-- Dùng đường viền theo hình dáng Slime để aura lan tỏa đẹp hơn -->
    <path class="aura-effect" d="M 50 145 C 50 85, 70 50, 100 50 C 130 50, 150 85, 150 145 C 160 145, 160 165, 100 165 C 40 165, 40 145, 50 145 Z" />
    <path class="aura-effect aura-delay" d="M 50 145 C 50 85, 70 50, 100 50 C 130 50, 150 85, 150 145 C 160 145, 160 165, 100 165 C 40 165, 40 145, 50 145 Z" />

    <!-- Bóng dưới mặt đất -->
    <ellipse class="trust-shadow" cx="100" cy="165" rx="55" ry="12" fill="#000000" />

    <!-- CƠ THỂ SLIME -->
    <g class="trust-body">
        
        <!-- Thân hình Slime màu xanh lá -->
        <path d="M 50 145 C 50 85, 70 50, 100 50 C 130 50, 150 85, 150 145 C 160 145, 160 165, 100 165 C 40 165, 40 145, 50 145 Z" fill="#34d399" />

        <!-- Điểm nhấn bắt sáng -->
        <path d="M 70 75 Q 100 55 130 75" stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4" />

        <!-- KHUÔN MẶT TỰ TIN -->
        <g class="trust-face">
            <!-- Mắt trái nhắm cười tự tin -->
            <path d="M 72 102 Q 80 92 88 102" stroke="#0f172a" stroke-width="4.5" stroke-linecap="round" fill="none" />
            
            <!-- Mắt phải nhắm cười tự tin -->
            <path d="M 112 102 Q 120 92 128 102" stroke="#0f172a" stroke-width="4.5" stroke-linecap="round" fill="none" />

            <!-- Má hồng -->
            <ellipse cx="65" cy="110" rx="8" ry="4" fill="#ef4444" opacity="0.3" />
            <ellipse cx="135" cy="110" rx="8" ry="4" fill="#ef4444" opacity="0.3" />

            <!-- Nụ cười nhếch mép (Smirk) đầy tự hào -->
            <path d="M 88 116 Q 100 126 116 110" stroke="#0f172a" stroke-width="3.5" stroke-linecap="round" fill="none" />
        </g>
    </g>

    <!-- Ngôi sao lấp lánh (Sparkle) bật lên cạnh má -->
    <!-- Nằm ngoài trust-body để không bị kéo giãn theo cơ thể -->
    <polygon class="trust-sparkle" points="135,75 137,87 148,89 137,92 135,103 132,92 121,89 132,87" fill="#fbbf24" />

</svg>