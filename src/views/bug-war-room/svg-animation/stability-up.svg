<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="320" height="320" style="overflow: visible;">
    <style>
        /* Nhịp thở cực kỳ nhỏ và ổn định, trọng tâm hạ thấp (Ít dao động) */
        .stable-body {
            transform-origin: 100px 165px;
            animation: stable-breathe 4s ease-in-out infinite;
        }

        @keyframes stable-breathe {
            /* Base pose: Hơi bè ra ở đáy để tạo cảm giác nặng, bám đất */
            0%, 100% { transform: scale(1.04, 0.96) translateY(2px); }
            /* Thở lên cực nhẹ */
            50% { transform: scale(1.01, 0.99) translateY(0.5px); }
        }

        /* Bóng đổ gần như đứng im, chỉ thay đổi cực nhỏ */
        .stable-shadow {
            transform-origin: 100px 165px;
            animation: stable-shadow-anim 4s ease-in-out infinite;
        }

        @keyframes stable-shadow-anim {
            0%, 100% { transform: scale(1.05); opacity: 0.35; }
            50% { transform: scale(1); opacity: 0.3; }
        }

        /* Khiên lục giác (Hexagon Shield) đại diện cho Stability/Defense */
        .hex-shield {
            transform-origin: 100px 110px;
            animation: hex-pulse 4s ease-in-out infinite;
            fill: rgba(16, 185, 129, 0.1); /* Màu xanh lục bảo nhạt */
            stroke: #10b981;
            stroke-width: 3;
            stroke-dasharray: 20 10; /* Viền đứt nét phong cách công nghệ/phòng thủ */
        }

        @keyframes hex-pulse {
            0%, 100% { transform: scale(0.95); opacity: 0.3; stroke-dashoffset: 0; }
            50% { transform: scale(1.02); opacity: 0.8; stroke-dashoffset: 30; }
        }

        /* Sóng neo giữ dưới đất (Grounding Rings) */
        .ground-ring {
            transform-origin: 100px 165px;
            fill: none;
            stroke: #10b981; /* Xanh lục bảo */
            animation: ring-expand 3s infinite ease-out;
        }

        .ring-1 { animation-delay: 0s; }
        .ring-2 { animation-delay: 1.5s; }

        @keyframes ring-expand {
            0% { transform: scale(0.7); opacity: 0.8; stroke-width: 4; }
            100% { transform: scale(2.2); opacity: 0; stroke-width: 1; }
        }

        /* Chớp mắt chậm rãi, điềm tĩnh */
        .calm-blink {
            transform-origin: 100px 100px;
            animation: slow-blink 5s infinite;
        }

        @keyframes slow-blink {
            0%, 45%, 55%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.1); }
        }
        
        /* Mũi tên hướng lên (Buff Up effect) */
        .buff-arrow {
            animation: float-up 2s infinite ease-in-out;
            opacity: 0;
        }
        
        .arrow-1 { animation-delay: 0s; transform-origin: 60px 80px; }
        .arrow-2 { animation-delay: 1s; transform-origin: 140px 90px; }

        @keyframes float-up {
            0% { transform: translateY(10px); opacity: 0; }
            50% { transform: translateY(-5px); opacity: 0.6; }
            100% { transform: translateY(-20px); opacity: 0; }
        }
    </style>

    <!-- SÓNG NĂNG LƯỢNG BÁM ĐẤT (Grounding Rings) -->
    <ellipse class="ground-ring ring-1" cx="100" cy="165" rx="50" ry="12" />
    <ellipse class="ground-ring ring-2" cx="100" cy="165" rx="50" ry="12" />

    <!-- KHIÊN LỤC GIÁC PHÒNG THỦ (Nằm sau nhân vật) -->
    <polygon class="hex-shield" points="100,40 160,75 160,145 100,180 40,145 40,75" />

    <!-- Bóng dưới mặt đất -->
    <ellipse class="stable-shadow" cx="100" cy="165" rx="55" ry="12" fill="#000000" />

    <!-- NHÓM CƠ THỂ SLIME VỮNG VÀNG -->
    <g class="stable-body">
        
        <!-- Thân hình Slime màu xanh lá chính -->
        <path d="M 50 145 C 50 85, 70 50, 100 50 C 130 50, 150 85, 150 145 C 160 145, 160 165, 100 165 C 40 165, 40 145, 50 145 Z" fill="#34d399" />

        <!-- Điểm nhấn bắt sáng mượt mà -->
        <path d="M 70 75 Q 100 55 130 75" stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4" />

        <!-- KHUÔN MẶT KIÊN ĐỊNH / ĐIỀM TĨNH -->
        <g class="calm-blink">
            <!-- Mắt trái mở to, tập trung -->
            <circle cx="80" cy="100" r="7" fill="#0f172a" />
            <circle cx="78" cy="98" r="2.5" fill="#ffffff" />
            
            <!-- Mắt phải mở to, tập trung -->
            <circle cx="120" cy="100" r="7" fill="#0f172a" />
            <circle cx="118" cy="98" r="2.5" fill="#ffffff" />

            <!-- Má hồng nhẹ nhàng -->
            <ellipse cx="65" cy="110" rx="7" ry="3.5" fill="#ef4444" opacity="0.2" />
            <ellipse cx="135" cy="110" rx="7" ry="3.5" fill="#ef4444" opacity="0.2" />

            <!-- Miệng mím lại hình đường thẳng (Kiên quyết, vững vàng) -->
            <path d="M 90 115 Q 100 117 110 115" stroke="#0f172a" stroke-width="3.5" fill="none" stroke-linecap="round" />
        </g>
    </g>

    <!-- MŨI TÊN BUFF "UP" BAY LÊN TỪ 2 BÊN -->
    <g stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path class="buff-arrow arrow-1" d="M 55 90 L 60 85 L 65 90" />
        <path class="buff-arrow arrow-2" d="M 135 100 L 140 95 L 145 100" />
    </g>
</svg>